<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu bản thân</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-top: 50px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 150px;
            border-radius: 50%;
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        .info {
            margin-top: 20px;
            text-align: left;
        }
        .info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/150" alt="Avatar">
    <h1>Xin chào, tôi là Ho Hoàng Tiến 👋</h1>
    <p>Sinh viên ngành Công nghệ thông tin</p>

    <div class="info">
        <p><strong>Email:</strong> hohoangtien@example.com</p>
        <p><strong>Sở thích:</strong> Lập trình, chơi game, học công nghệ mới</p>
        <p><strong>Kỹ năng:</strong> Java, Spring Boot, Flutter, Firebase</p>
        <p><strong>Mục tiêu:</strong> Trở thành lập trình viên Fullstack</p>
    </div>
</div>

</body>
</html>
